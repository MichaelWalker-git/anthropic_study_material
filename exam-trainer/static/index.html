<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Exam Trainer — Claude Certified Architect</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>Exam Trainer</h1>
    <span class="sub">Claude Certified Architect — Foundations</span>
  </header>

  <!-- Екран налаштування сесії -->
  <section id="setup" class="card">
    <h2>Нова сесія</h2>
    <label>Режим
      <select id="mode">
        <option value="practice">Practice — один сценарій</option>
        <option value="exam">Exam — 60 питань з усіх</option>
      </select>
    </label>
    <label id="scenario-row">Сценарій
      <select id="scenario"><option value="">Усі сценарії</option></select>
    </label>
    <label class="checkbox"><input type="checkbox" id="instant-feedback" /> Показувати відповідь одразу</label>
    <div class="actions">
      <button id="start">Почати</button>
    </div>
    <div id="resume-row" class="muted hidden">
      <button id="resume" class="secondary">↩ Продовжити збережену сесію</button>
      <span id="resume-info"></span>
    </div>
    <div id="stats-summary" class="muted"></div>
  </section>

  <!-- Екран питання -->
  <section id="quiz" class="card hidden">
    <div class="progress"><span id="progress-text"></span> · <span id="scenario-tag"></span></div>
    <p id="situation" class="situation"></p>
    <p id="prompt" class="prompt"></p>
    <div id="options"></div>
    <div id="feedback" class="feedback hidden"></div>
    <div class="actions">
      <button id="prev" class="secondary hidden">← Назад</button>
      <button id="submit" disabled>Відповісти</button>
      <button id="next" class="hidden">Далі →</button>
    </div>

    <!-- Навігатор питань (унизу): номери з підсвіткою стану, клік = перехід -->
    <nav id="nav" class="nav">
      <div class="nav-head">
        <span>Питання</span>
        <span id="nav-legend" class="nav-legend"></span>
      </div>
      <div id="nav-grid" class="nav-grid"></div>
    </nav>
  </section>

  <!-- Екран результатів -->
  <section id="results" class="card hidden">
    <h2>Результат</h2>
    <div id="score"></div>
    <div id="breakdown"></div>
    <div class="actions">
      <button id="diagnose" class="secondary">🧠 Розбір помилок (AI)</button>
      <button id="drill-weak">🎯 Підтягнути слабкі місця</button>
      <button id="restart" class="secondary">Нова сесія</button>
    </div>
    <div id="diagnosis" class="diagnosis hidden"></div>
  </section>

  <script src="/static/app.js"></script>
</body>
</html>
